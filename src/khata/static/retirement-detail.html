<!DOCTYPE html>
<html lang="en" data-cur="inr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khata — Retirement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/assets/app.css">
<style>
/* ── retirement-detail.html-only rules (shell + detail-panel groups live in app.css) ── */
.emptypanel{padding:30px 22px;text-align:center;color:var(--ink-faint);font-size:13.5px}

/* contribution split: stacked horizontal bar across three honest segments */
.cstack{padding:18px 22px 22px}
.cstack-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;gap:14px}
.cstack-amt{font-family:"Fraunces",serif;font-weight:600;font-size:27px;letter-spacing:-.02em;line-height:1}
.cstack-cap{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;white-space:nowrap}

/* projection: nominal-vs-real readout + sampled growth curve */
.projbody{padding:18px 22px 22px}
.projfig{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.projcard{border:1px solid var(--line);border-radius:12px;padding:14px}
.projcard .pl{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.projcard .pv{font-family:"Fraunces",serif;font-weight:600;font-size:23px;margin-top:6px;line-height:1}
.projcard.real .pv{color:var(--pos)}
.projcard .ps{font-size:11.5px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:5px}
.curve{display:flex;gap:3px;align-items:flex-end;height:88px;margin-top:4px}
.curve .cbar{flex:1;background:var(--paper-2);border-radius:3px 3px 0 0;display:flex;align-items:flex-end;min-height:6px}
.curve .cbar i{display:block;width:100%;height:0;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--primary),var(--primary-deep));transition:height 1s var(--ease);transition-delay:calc(var(--i,0)*22ms)}
.curve-axis{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:7px}
.curvenote{font-size:11.5px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:9px;line-height:1.5}

/* assumptions readout */
.terms{padding:6px 0}
.terms .trow{display:flex;justify-content:space-between;align-items:center;padding:11px 22px;border-top:1px solid var(--line-2);font-size:13.5px}
.terms .trow:first-child{border-top:none}
.terms .trow .tk{color:var(--ink-faint)}
.terms .trow .tv{font-family:"JetBrains Mono";font-weight:600;text-align:right}
.editbtn{margin:14px 22px 20px;font-weight:600;font-size:13.5px;padding:9px 14px;border-radius:10px;border:1px dashed var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer}
.editbtn:hover{border-color:var(--primary);color:var(--ink)}

/* update-assumptions slide-over (page-specific, copied from asset/loan-detail pattern) */
.scrim{position:fixed;inset:0;background:rgba(20,16,12,.45);opacity:0;visibility:hidden;transition:opacity .3s var(--ease),visibility .3s;z-index:40}
.scrim.on{opacity:1;visibility:visible}
.over{position:fixed;top:0;right:0;bottom:0;width:min(440px,94vw);background:var(--card);border-left:1px solid var(--line);box-shadow:-24px 0 60px -30px rgba(28,24,19,.5);transform:translateX(100%);transition:transform .42s var(--ease);z-index:45;display:flex;flex-direction:column;overflow-y:auto}
.over.on{transform:none}
.over .oh{padding:24px 26px 18px;border-bottom:1px solid var(--line)}
.over .eyebrow{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.over .oh h3{font-family:"Fraunces",serif;font-weight:600;font-size:24px;margin-top:6px;letter-spacing:-.01em}
.over .oh h3 em{font-style:italic;color:var(--primary-deep)}
.over .osub{font-size:12.5px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:6px}
.over .obody{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:700}
.fld input{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);transition:border-color .2s}
.fld input:focus{outline:none;border-color:var(--primary)}
.err{color:var(--neg);font-size:13px;min-height:18px}
.acts{display:flex;gap:12px;align-items:center;margin-top:4px}
.acts .save{font-weight:600;font-size:14px;padding:10px 18px;border-radius:10px;background:var(--primary);color:var(--paper);border:none;cursor:pointer;box-shadow:0 8px 18px -10px var(--primary);transition:transform .2s}
.acts .save:hover{transform:translateY(-2px)}
.acts .cancel{font-weight:600;font-size:14px;color:var(--ink-faint);cursor:pointer}
.acts .cancel:hover{color:var(--ink)}
</style>
</head>

<!-- update-assumptions slide-over -->
<div class="scrim" id="scrim"></div>
<aside class="over" id="over" aria-hidden="true">
  <div class="oh">
    <div class="eyebrow">Assumptions</div>
    <h3>Update <em>plan</em></h3>
    <div class="osub" id="osub"></div>
  </div>
  <div class="obody">
    <div class="row2">
      <div class="fld"><label for="current_balance">Current balance</label><input id="current_balance" placeholder="0" inputmode="decimal"></div>
      <div class="fld"><label for="monthly_contribution">Monthly contribution</label><input id="monthly_contribution" placeholder="10,000" inputmode="decimal"></div>
    </div>
    <div class="row2">
      <div class="fld"><label for="employer_match">Employer match %</label><input id="employer_match" placeholder="0" inputmode="decimal"></div>
      <div class="fld"><label for="annual_return">Annual return %</label><input id="annual_return" placeholder="8" inputmode="decimal"></div>
    </div>
    <div class="row2">
      <div class="fld"><label for="inflation">Inflation %</label><input id="inflation" placeholder="6" inputmode="decimal"></div>
      <div class="fld"><label for="current_age">Current age</label><input id="current_age" placeholder="30" inputmode="numeric"></div>
    </div>
    <div class="fld"><label for="retirement_age">Retirement age</label><input id="retirement_age" placeholder="60" inputmode="numeric"></div>

<script src="/static/assets/sharing.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const pid = parseInt(location.pathname.split("/").pop(), 10);
let BASE = "INR";
let CUR = null; // current retirement state

// ── currency formatting (real amounts already in BASE; no client-side conversion) ──
function indGroup(n){n=Math.round(n);let s=Math.abs(n).toString();if(s.length>3){let l=s.slice(-3),r=s.slice(0,-3).replace(/\B(?=(\d{2})+(?!\d))/g,',');s=r+','+l;}return (n<0?'-':'')+s;}
function usGroup(n){return Math.round(n).toLocaleString('en-US');}
function sym(ccy){return ccy==='INR'?'₹':'$';}
function fmtNum(minor, ccy){
  if(minor===null||minor===undefined) return '—';
  const v=minor/100;
  return ccy==='INR'?indGroup(v):usGroup(v);
}

function el(tag, cls, text){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text!==undefined && text!==null) e.textContent=text;
  return e;
}
// an amount cell = <symbol><number>, all textContent (K4)
function amtSpan(minor, cls){
  const wrap=document.createElement('span');
  if(cls) wrap.className=cls;
  if(minor===null||minor===undefined){ wrap.textContent='—'; return wrap; }
  const neg=minor<0;
  const s=document.createElement('span'); s.className='symword'; s.textContent=(neg?'-':'')+sym(BASE);
  const n=document.createElement('span'); n.textContent=fmtNum(Math.abs(minor), BASE);
  wrap.append(s,n);
  return wrap;
}

// ── header KPIs + horizon ──
function renderHeader(box, plan, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t'); t.append(el('span','tag retirement','401(k)'), document.createTextNode(' '));
  const nm=el('span'); nm.textContent=plan.name; t.append(nm);
  const yrs=Math.round((st.months_to_retirement||0)/12);
  const meta='age '+st.current_age+'→'+st.retirement_age+' · '+yrs+' yrs · '+(st.annual_return_bps/100)+'% return';
  ph.append(t, el('div','meta', meta));
  box.append(ph);

  const kpis=el('div','kpis');
  function kpi(cls,label,minor){
    const k=el('div','kpi'+(cls?' '+cls:''));
    k.append(el('div','l',label));
    const n=el('div','n'); n.append(amtSpan(minor)); k.append(n);
    return k;
  }
  kpis.append(
    kpi('rem','Projected corpus',st.projected_corpus_minor),
    kpi('paid',"In today's money",st.projected_corpus_real_minor),
    kpi('','Current balance',st.current_balance_minor));
  box.append(kpis);

  // ── horizon progress: how far through the accumulation runway ──
  // current_balance vs projected_corpus, labelled honestly (where you are vs target).
  const proj=st.projected_corpus_minor||0, bal=st.current_balance_minor||0;
  const pct = proj>0 ? Math.min(100, Math.round(bal*100/proj)) : 0;
  const head=el('div','planhead');
  const row=el('div','row');
  row.append(el('span', null, 'Balance vs projected corpus'));
  row.append(el('span', null, pct+'% of target accrued'));
  head.append(row);
  const bar=el('div','bigbar'); const i=el('i'); i.dataset.w=pct; bar.append(i);
  for(const tk of [25,50,75]){ const s=el('span','tick'); s.style.left=tk+'%'; bar.append(s); }
  head.append(bar);
  box.append(head);
}

// ── projection panel: nominal vs real + sampled growth curve ──
// The curve replicates the backend's compound formula exactly:
//   g = 1 + annual_return_bps/120000   (monthly growth factor)
//   eff = monthly_contribution * (1 + employer_match_bps/10000)
//   fv(t) = current_balance*g^t + eff*(g^t - 1)/g_rate     (annuity-immediate)
// so fv(months_to_retirement) === projected_corpus_minor (server value).
function projAt(st, t){
  const mr=(st.annual_return_bps||0)/120000;
  const g=1+mr;
  const eff=(st.monthly_contribution_minor||0)*(1+(st.employer_match_bps||0)/10000);
  const gt=Math.pow(g,t);
  const fvCur=(st.current_balance_minor||0)*gt;
  const annuity = mr>0 ? (gt-1)/mr : t;
  return fvCur + eff*annuity;
}
function renderProjection(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Projection'); t.style.fontSize='16px';
  const yrs=Math.round((st.months_to_retirement||0)/12);
  ph.append(t, el('div','meta', yrs+'-yr horizon · monthly compounding'));
  box.append(ph);

  const body=el('div','projbody');

  const fig=el('div','projfig');
  const c1=el('div','projcard');
  c1.append(el('div','pl','Projected corpus'));
  const v1=el('div','pv'); v1.append(amtSpan(st.projected_corpus_minor)); c1.append(v1);
  c1.append(el('div','ps','nominal · at retirement'));
  const c2=el('div','projcard real');
  c2.append(el('div','pl',"In today's money"));
  const v2=el('div','pv'); v2.append(amtSpan(st.projected_corpus_real_minor)); c2.append(v2);
  c2.append(el('div','ps','real · '+(st.inflation_bps/100)+'% inflation'));
  fig.append(c1,c2);
  body.append(fig);

  // sampled curve — replicate backend compound at evenly spaced months
  const n=st.months_to_retirement||0;
  const curve=el('div','curve');
  if(n>0){
    const N=24; // sample count
    const pts=[];
    for(let k=0;k<=N;k++){ pts.push(projAt(st, Math.round(n*k/N))); }
    const peak=pts[pts.length-1] || 1;
    pts.forEach((p,idx)=>{
      const h=peak>0 ? Math.max(3, Math.round(p*100/peak)) : 3;
      const cb=el('div','cbar');
      const fi=el('i'); fi.dataset.h=h; fi.style.setProperty('--i', idx);
      cb.append(fi); curve.append(cb);
    });
    body.append(curve);
    const ax=el('div','curve-axis');
    ax.append(el('span', null, 'now · age '+st.current_age),
              el('span', null, Math.round(yrs/2)+' yrs'),
              el('span', null, 'age '+st.retirement_age));
    body.append(ax);
    const note=el('div','curvenote', 'Endpoint matches the server projection — monthly compounding of your effective contribution at '+(st.annual_return_bps/100)+'% from the current balance.');
    body.append(note);
  } else {
    body.append(el('div','emptypanel','Already at retirement age — no accumulation horizon.'));
  }
  box.append(body);
}

// ── contribution split: your contributions / employer match / projected growth ──
function renderContribution(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Contribution split'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','where the corpus comes from'));
  box.append(ph);

  const body=el('div','cstack');
  const head=el('div','cstack-head');
  const amt=el('div','cstack-amt'); amt.append(amtSpan(st.effective_monthly_minor)); head.append(amt);
  const matchPct=(st.employer_match_bps/100);
  head.append(el('div','cstack-cap','effective/mo · you + '+matchPct+'% match'));
  body.append(head);

  // Decompose the projected corpus into three honest, real-state-derived parts:
  //   your contributions over horizon, employer-match portion, and projected growth.
  const months=st.months_to_retirement||0;
  const youTotal=(st.monthly_contribution_minor||0)*months;          // your principal in
  const matchTotal=Math.max(0,(st.total_contributions_minor||0)-youTotal); // employer portion
  const growth=Math.max(0,(st.projected_corpus_minor||0)
    -(st.total_contributions_minor||0)-(st.current_balance_minor||0)); // compound growth (clamp ≥0)
  // Include the opening balance so the segments sum to the projected corpus —
  // otherwise the "100% = projected corpus" total row would overstate the base
  // the percentages are measured against.
  const segs=[
    {label:'Opening balance',     minor:(st.current_balance_minor||0), color:'var(--ink-faint)'},
    {label:'Your contributions', minor:youTotal, color:'var(--primary)'},
    {label:'Employer match',      minor:matchTotal, color:'var(--pos)'},
    {label:'Projected growth',    minor:growth, color:'var(--accent)'},
  ];
  const totalAll=segs.reduce((s,x)=>s+x.minor,0) || 1;

  // stacked bar
  const stackbar=el('div','stackbar');
  segs.forEach(s=>{
    const seg=el('i'); seg.style.background=s.color;
    seg.dataset.w=Math.round(s.minor*100/totalAll); seg.title=s.label;
    stackbar.append(seg);
  });
  body.append(stackbar);

  // rows
  const frows=el('div','frows');
  segs.forEach(s=>{
    const pct=Math.round(s.minor*100/totalAll);
    const fr=el('div','fr');
    const dot=el('span','dot'); dot.style.background=s.color; fr.append(dot);
    const mid=el('div','mid');
    mid.append(el('div','nm', s.label));
    const track=el('div','track'); const ti=el('i'); ti.style.background=s.color; ti.dataset.w=pct; track.append(ti); mid.append(track);
    fr.append(mid);
    const rt=el('div','rt');
    rt.append(amtSpan(s.minor,'amt2'));
    rt.append(el('span','pct',pct+'%'));
    fr.append(rt);
    frows.append(fr);
  });
  // total row (projected corpus)
  const tr=el('div','fr total');
  tr.append(el('span'));
  const tmid=el('div','mid'); tmid.append(el('div','nm','Projected corpus')); tr.append(tmid);
  const trt=el('div','rt'); trt.append(amtSpan(st.projected_corpus_minor,'amt2')); trt.append(el('span','pct','100%')); tr.append(trt);
  frows.append(tr);
  body.append(frows);
  box.append(body);
}

// ── assumptions readout ──
function renderTerms(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Assumptions'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','editable'));
  box.append(ph);
  const body=el('div','terms');
  function trow(k,node){
    const r=el('div','trow');
    r.append(el('span','tk',k));
    const tv=el('span','tv'); tv.append(node); r.append(tv);
    body.append(r);
  }
  trow('Current balance', amtSpan(st.current_balance_minor));
  trow('Monthly contribution', amtSpan(st.monthly_contribution_minor));
  trow('Employer match', document.createTextNode((st.employer_match_bps/100)+'%'));
  trow('Annual return', document.createTextNode((st.annual_return_bps/100)+'%'));
  trow('Inflation', document.createTextNode((st.inflation_bps/100)+'%'));
  trow('Current age', document.createTextNode(String(st.current_age)));
  trow('Retirement age', document.createTextNode(String(st.retirement_age)));
  box.append(body);
  const btn=el('button','editbtn','Update assumptions');
  btn.addEventListener('click', openOver);
  box.append(btn);
}

// ── members (sharing) ──
function renderMembers(box){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Members'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','joint ownership'));
  box.append(ph);
  const body=el('div'); body.style.padding='18px 22px';
  box.append(body);
  mountSharing(pid, body);
}

// ── slide-over open/close ──
function openOver(){
  $('err').textContent='';
  if(CUR){
    $('current_balance').value = CUR.current_balance_minor/100;
    $('monthly_contribution').value = CUR.monthly_contribution_minor/100;
    $('employer_match').value = CUR.employer_match_bps/100;
    $('annual_return').value = CUR.annual_return_bps/100;
    $('inflation').value = CUR.inflation_bps/100;
    $('current_age').value = parseInt(CUR.current_age,10);
    $('retirement_age').value = parseInt(CUR.retirement_age,10);
  }
  $('scrim').classList.add('on'); $('over').classList.add('on'); $('over').setAttribute('aria-hidden','false');
}
function closeOver(){ $('scrim').classList.remove('on'); $('over').classList.remove('on'); $('over').setAttribute('aria-hidden','true'); }

// ── boot ──
async function boot(){
  const me = await fetch('/api/auth/me');
  if(me.status===401){ window.location.href='/'; return; }
  const user=(await me.json()).user;
  $('ava-init').textContent=((user.display_name||'?')[0]||'?').toUpperCase();

  const r = await fetch('/api/plans/'+pid);
  if(r.status===401){ window.location.href='/'; return; }
  if(!r.ok){ window.location.href='/app'; return; }
  const d = await r.json();
  if(d.plan.type!=='retirement'){ window.location.href='/app'; return; }

  const plan=d.plan, st=d.state;
  CUR = st;
  BASE = plan.currency || 'INR';
  document.documentElement.dataset.cur = BASE.toLowerCase();
  document.title = 'Khata — '+plan.name;
  document.querySelectorAll('#curtog button').forEach(b=>b.classList.toggle('on', b.dataset.set===BASE));

  $('name').textContent = plan.name;
  $('sub').textContent = '401(k) · '+plan.status+' · '+BASE;
  $('osub').textContent = 'for '+plan.name;

  renderHeader($('header-panel'), plan, st);
  renderProjection($('proj-panel'), st);
  renderContribution($('contrib-panel'), st);
  renderTerms($('terms-panel'), st);
  renderMembers($('members-panel'));

  // sidebar counts from /api/plans
  try{
    const plansResp = await fetch('/api/plans').then(x=>x.json());
    const plans = plansResp.plans || [];
    const by=(t)=>plans.filter(p=>p.type===t).length||'';
    $('ct-asset').textContent=by('asset');
    $('ct-chit').textContent=by('chit');
    $('ct-loan').textContent=by('loan');
    $('ct-retirement').textContent=by('retirement');
  }catch(e){}

  // trigger bar/segment/curve width+height animations after render
  setTimeout(()=>{
    document.querySelectorAll('[data-w]').forEach(b=>b.style.width=b.dataset.w+'%');
    document.querySelectorAll('.curve .cbar i[data-h]').forEach(b=>b.style.height=b.dataset.h+'%');
  },350);
}

// ── currency toggle: real base-currency switch ──
$('curtog').addEventListener('click', async (e)=>{
  const b=e.target.closest('button'); if(!b) return;
  const target=b.dataset.set;
  if(target===BASE) return;
  await fetch('/api/base-currency',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currency:target})});
  location.reload();
});

// ── update-assumptions wiring ──
$('editbtn').addEventListener('click', openOver);
$('cancel').addEventListener('click', closeOver);
$('scrim').addEventListener('click', closeOver);
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeOver(); });
$('save').addEventListener('click', async ()=>{
  $('err').textContent='';
  const body={};
  for(const k of ['current_balance','monthly_contribution','employer_match',
                  'annual_return','inflation','current_age','retirement_age']){
    const v=$(k).value.trim();
    if(v!=='') body[k]=v;
  }
  const r=await fetch('/api/plans/'+pid+'/retirement/update',
    { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if(r.ok){ closeOver(); boot(); return; }
  const e=await r.json().catch(()=>({}));
  $('err').textContent = e.detail || e.error || 'Could not save the plan.';
});

// ── profile photo upload (localStorage, display-only) ──
(function(){var av=document.getElementById("avatar");if(!av)return;try{localStorage.removeItem("khata_avatar");}catch(e){}var inp=av.querySelector("input");if(inp)inp.disabled=true;av.title="Edit photo in Settings";av.style.cursor="pointer";av.addEventListener("click",function(e){e.preventDefault();window.location.href="/settings";});fetch("/api/auth/me").then(function(r){return r.ok?r.json():null;}).then(function(d){if(d&&d.user&&d.user.avatar){av.style.backgroundImage='url("'+d.user.avatar+'")';av.classList.add("has-img");}else{av.style.backgroundImage="";av.classList.remove("has-img");}}).catch(function(){});})();

boot();
</script>
</body>
