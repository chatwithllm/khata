<html lang="en" data-cur="inr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ── holding-detail.html-only rules (shell + shared groups live in app.css) ── */
.emptypanel{padding:30px 22px;text-align:center;color:var(--ink-faint);font-size:13.5px}

/* header KPI accents */
.kpi.pos .n{color:var(--pos)} .kpi.neg .n{color:var(--neg)}

/* position readout */
.terms{padding:6px 0}
.terms .trow{display:flex;justify-content:space-between;align-items:center;padding:11px 22px;border-top:1px solid var(--line-2);font-size:13.5px}
.terms .trow:first-child{border-top:none}
.terms .trow .tk{color:var(--ink-faint)}
.terms .trow .tv{font-family:"JetBrains Mono";font-weight:600;text-align:right}
.terms .trow .tv.pos{color:var(--pos)} .terms .trow .tv.neg{color:var(--neg)}

/* refresh (live) button — quieter than the primary add button */
.livebtn{font-weight:600;font-size:13.5px;padding:9px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer}
.livebtn:hover{border-color:var(--primary);color:var(--ink)}

/* slide-over (copied from asset-detail pattern) */
.scrim{position:fixed;inset:0;background:rgba(20,16,12,.45);opacity:0;visibility:hidden;transition:opacity .3s var(--ease),visibility .3s;z-index:40}
.scrim.on{opacity:1;visibility:visible}
.over{position:fixed;top:0;right:0;bottom:0;width:min(440px,94vw);background:var(--card);border-left:1px solid var(--line);box-shadow:-24px 0 60px -30px rgba(28,24,19,.5);transform:translateX(100%);transition:transform .42s var(--ease);z-index:45;display:flex;flex-direction:column;overflow-y:auto}
.over.on{transform:none}
.over .oh{padding:24px 26px 18px;border-bottom:1px solid var(--line)}
.over .eyebrow{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.over .oh h3{font-family:"Fraunces",serif;font-weight:600;font-size:24px;margin-top:6px;letter-spacing:-.01em}
.over .oh h3 em{font-style:italic;color:var(--primary-deep)}
.over .osub{font-size:12.5px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:6px}
.over .obody{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:700}
.fld input,.fld select{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);transition:border-color .2s}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--primary)}
.err{color:var(--neg);font-size:13px;min-height:18px}
.acts{display:flex;gap:12px;align-items:center;margin-top:4px}
.acts .save{font-weight:600;font-size:14px;padding:10px 18px;border-radius:10px;background:var(--primary);color:var(--paper);border:none;cursor:pointer;box-shadow:0 8px 18px -10px var(--primary);transition:transform .2s}
.acts .save:hover{transform:translateY(-2px)}
.acts .cancel{font-weight:600;font-size:14px;color:var(--ink-faint);cursor:pointer}
.acts .cancel:hover{color:var(--ink)}
/* phone micro-type floor (responsive pass) */
@media(max-width:560px){ .over .eyebrow{font-size:11px} }
/* plan-level actions (delete) — ghost button, right of the meta (loan-detail pattern) */
.planacts{display:flex;gap:8px;align-items:center;flex:none}
.planacts .plandel{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;user-select:none;transition:border-color .2s,color .2s,background .2s}
.planacts svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.planacts .plandel:hover{border-color:var(--neg);color:var(--neg);background:color-mix(in srgb,var(--neg) 6%,transparent)}
.planacts .planshare{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;user-select:none;transition:border-color .2s,color .2s,background .2s}
.planacts .planshare:hover{border-color:var(--primary);color:var(--primary-deep)}
.planacts .planprint{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;user-select:none;transition:border-color .2s,color .2s,background .2s}
.planacts .planprint:hover{border-color:var(--ink);color:var(--ink)}
@media(pointer:coarse){ .planacts .plandel,.planacts .planshare,.planacts .planprint{min-height:44px;padding:10px 14px} }
.ph-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end}
/* share-list panel */
.share-list-panel{padding:18px 22px}
.share-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-2);font-size:13px;font-family:"JetBrains Mono"}
.share-row:last-child{border-bottom:none}
.share-empty{font-size:13.5px;color:var(--ink-faint);padding:10px 0}
.share-revoke{font:inherit;font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--neg);cursor:pointer}
.share-revoke:hover{background:color-mix(in srgb,var(--neg) 8%,transparent)}
@media print{
  .side,.top-right,.planacts,.share-list-panel,#addbtn,#refreshbtn{display:none!important}
  .app{display:block}
  .main{margin:0;padding:0}
  .grid2{display:block}
}
</head>
<body>
<div class="app">
  <!-- sidebar -->

    <a class="nav-i" href="#" style="color:var(--neg)" onclick="event.preventDefault();fetch('/api/auth/logout',{method:'POST'}).finally(function(){location.href='/'})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg> Log out</a>

        <label class="avatar" id="avatar" title="Upload profile photo"><input type="file" accept="image/*" /><span class="ava-init" id="ava-init"></span><span class="ava-ov"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span></label>

<!-- buy/sell/quote slide-over -->
<div class="scrim" id="scrim"></div>
<aside class="over" id="over" aria-hidden="true">

    <div class="eyebrow">Holding action</div>

  </div>
  <div class="obody">
    <div class="fld"><label for="act">Action</label>
      <select id="act"><option value="buy">Buy</option><option value="sell">Sell</option><option value="quote">Set quote (price / unit)</option></select>
    </div>
    <div class="fld" id="qtyfld"><label for="quantity">Quantity</label><input id="quantity" placeholder="10" inputmode="decimal"></div>

    <div class="fld" id="pricefld" style="display:none"><label for="price">Price per unit</label><input id="price" placeholder="60,000" inputmode="decimal"></div>

<script>
const $ = (id) => document.getElementById(id);
const pid = parseInt(location.pathname.split("/").pop(), 10);
let BASE = "INR";
let UNIT = "";

// ── currency formatting (real amounts already in BASE; no client-side conversion) ──
function indGroup(n){n=Math.round(n);let s=Math.abs(n).toString();if(s.length>3){let l=s.slice(-3),r=s.slice(0,-3).replace(/\B(?=(\d{2})+(?!\d))/g,',');s=r+','+l;}return (n<0?'-':'')+s;}
function usGroup(n){return Math.round(n).toLocaleString('en-US');}
function sym(ccy){return ccy==='INR'?'₹':'$';}
function fmtNum(minor, ccy){
  if(minor===null||minor===undefined) return '—';
  const v=minor/100;
  return ccy==='INR'?indGroup(v):usGroup(v);
}
// quantity is micro-units (×1e6); render qty/1e6 grouped, no symbol
function fmtQty(micro){
  if(micro===null||micro===undefined) return '—';
  const v=micro/1e6;
  return (BASE==='INR'?v.toLocaleString('en-IN'):v.toLocaleString('en-US'));
}

function el(tag, cls, text){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text!==undefined && text!==null) e.textContent=text;
  return e;
}
// an amount cell = <symbol><number>, all textContent (K4)
function amtSpan(minor, cls){
  const wrap=document.createElement('span');
  if(cls) wrap.className=cls;
  if(minor===null||minor===undefined){ wrap.textContent='—'; return wrap; }
  const neg=minor<0;
  const s=document.createElement('span'); s.className='symword'; s.textContent=(neg?'-':'')+sym(BASE);
  const n=document.createElement('span'); n.textContent=fmtNum(Math.abs(minor), BASE);
  wrap.append(s,n);
  return wrap;
}

// "2025-02-15" / ISO -> "15 Feb 2025"
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(iso){
  if(!iso) return '—';
  const parts=String(iso).split('T')[0].split('-');
  if(parts.length<3) return iso;
  const y=parts[0], mi=parseInt(parts[1],10)-1, d=parseInt(parts[2],10);
  return d+' '+(MONTHS[mi]||'?')+' '+y;
}

// ── header KPIs ──
function renderHeader(box, plan, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t'); t.append(el('span','tag holding','Holding'), document.createTextNode(' '));
  const nm=el('span'); nm.textContent=plan.name; t.append(nm);
  const metaBits=[st.asset_class];
  if(st.purity) metaBits.push(st.purity);
  if(st.symbol) metaBits.push(st.symbol);
  const SVGNS='http://www.w3.org/2000/svg';
  const icon=(d)=>{ const s=document.createElementNS(SVGNS,'svg'); s.setAttribute('viewBox','0 0 24 24'); const p=document.createElementNS(SVGNS,'path'); p.setAttribute('d',d); s.append(p); return s; };
  const actBtn=(cls, label, dPath, fn)=>{ const b=el('span',cls); b.tabIndex=0; b.setAttribute('role','button'); b.append(icon(dPath), document.createTextNode(label));
    b.addEventListener('click', fn); b.addEventListener('keydown', (ev)=>{ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); fn(); } }); return b; };
  const acts=el('div','planacts');
  acts.append(actBtn('planshare','Share','M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13', openShareMenu));
  acts.append(actBtn('planprint','Print','M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z', printPlan));
  acts.append(actBtn('plandel','Delete','M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6', deletePlan));
  const right=el('div','ph-right');
  right.append(el('div','meta', metaBits.join(' · ')), acts);
  ph.append(t, right);
  box.append(ph);

  const kpis=el('div','kpis');
  function kpiAmt(cls,label,minor){
    const k=el('div','kpi'+(cls?' '+cls:''));
    k.append(el('div','l',label));
    const n=el('div','n'); n.append(amtSpan(minor)); k.append(n);
    return k;
  }
  const gainCls = (st.unrealized_gain_minor||0) > 0 ? 'pos' : ((st.unrealized_gain_minor||0) < 0 ? 'neg' : '');
  // quantity KPI (qty held / 1e6 + unit), text-only
  const qk=el('div','kpi');
  qk.append(el('div','l','Quantity held'));
  const qn=el('div','n'); qn.textContent=fmtQty(st.qty_held_micro)+' '+st.unit; qk.append(qn);
  kpis.append(
    kpiAmt('','Current value',st.current_value_minor),
    kpiAmt(gainCls,'Unrealized gain',st.unrealized_gain_minor),
    qk);
  box.append(kpis);

  // caption line
  const head=el('div','planhead');
  const row=el('div','row');
  const lcap=el('span');
  lcap.append(document.createTextNode('avg cost '));
  lcap.append(amtSpan(st.avg_cost_per_unit_minor));
  lcap.append(document.createTextNode('/'+st.unit));
  row.append(lcap);
  row.append(el('span', null, (st.current_price_minor!=null ? 'quote set' : 'no quote yet')));
  head.append(row);
  box.append(head);
}

// ── position panel ──
function renderPosition(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Position'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','cost & gains'));
  box.append(ph);
  const body=el('div','terms');
  function trowAmt(k,minor,cls){
    const r=el('div','trow');
    r.append(el('span','tk',k));
    const tv=el('span','tv'+(cls?' '+cls:'')); tv.append(amtSpan(minor)); r.append(tv);
    body.append(r);
  }
  function trowText(k,v){
    const r=el('div','trow');
    r.append(el('span','tk',k));
    const tv=el('span','tv'); tv.textContent=v; r.append(tv);
    body.append(r);
  }
  trowAmt('Avg cost / '+st.unit, st.avg_cost_per_unit_minor);
  trowAmt('Cost of held', st.cost_of_held_minor);
  trowAmt('Current price / '+st.unit, st.current_price_minor);
  trowText('Price as of', st.price_as_of ? fmtDate(st.price_as_of) : 'no quote');
  const rgCls = (st.realized_gain_minor||0) > 0 ? 'pos' : ((st.realized_gain_minor||0) < 0 ? 'neg' : '');
  trowAmt('Realized gain', st.realized_gain_minor, rgCls);
  box.append(body);
}

// ── live quote panel ──
function renderQuote(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Live quote'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','manual or feed'));
  box.append(ph);
  const body=el('div','terms');
  function trowAmt(k,minor){
    const r=el('div','trow');
    r.append(el('span','tk',k));
    const tv=el('span','tv'); tv.append(amtSpan(minor)); r.append(tv);
    body.append(r);
  }
  function trowText(k,v){
    const r=el('div','trow');
    r.append(el('span','tk',k));
    const tv=el('span','tv'); tv.textContent=v; r.append(tv);
    body.append(r);
  }
  if(st.current_price_minor==null){
    box.append(el('div','emptypanel','No quote yet. Set one via Quote, or refresh from a live feed.'));
    return;
  }
  trowAmt('Price / '+st.unit, st.current_price_minor);
  trowText('As of', st.price_as_of ? fmtDate(st.price_as_of) : '—');
  trowAmt('Current value', st.current_value_minor);
  box.append(body);
}

// ── members (sharing) ──
function renderMembers(box){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Members'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','joint ownership'));
  box.append(ph);
  const body=el('div'); body.style.padding='18px 22px';
  box.append(body);
  mountSharing(pid, body);
}

// ── slide-over open/close ──
function syncFields(){
  const a=$('act').value;
  $('qtyfld').style.display = a==='quote' ? 'none' : 'flex';
  $('amtfld').style.display = a==='quote' ? 'none' : 'flex';
  $('pricefld').style.display = a==='quote' ? 'flex' : 'none';
}
function openOver(){ $('err').textContent=''; syncFields(); $('scrim').classList.add('on'); $('over').classList.add('on'); $('over').setAttribute('aria-hidden','false'); $('quantity').focus(); }
function closeOver(){ $('scrim').classList.remove('on'); $('over').classList.remove('on'); $('over').setAttribute('aria-hidden','true'); }

// ── share menu + manage links ──
async function openShareMenu(){
  const scope = confirm('OK = full detail, Cancel = summary only') ? 'full' : 'summary';
  const ttlAns = prompt('Link valid for how many days? (7, 30, or 90)', '30');
  const ttl = parseInt(ttlAns, 10);
  if (![7,30,90].includes(ttl)) { alert('Pick 7, 30, or 90.'); return; }
  let r;
  try {
    r = await fetch('/api/plans/'+pid+'/shares', { method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ scope, ttl_days: ttl }) });
    if (!r.ok) throw new Error();
  } catch(e){ alert('Could not create link.'); return; }
  const { url } = await r.json();
  if (navigator.share) { try { await navigator.share({ title: document.title, url }); } catch(e){} }
  else { try { await navigator.clipboard.writeText(url); alert('Link copied:\n'+url); }
         catch(e){ prompt('Copy this link:', url); } }
  if (typeof loadShareList === 'function') loadShareList();
}

async function loadShareList(){
  const box = document.getElementById('share-list'); if (!box) return;
  let shares = [];
  try { shares = (await fetch('/api/plans/'+pid+'/shares').then(r=>r.json())).shares || []; }
  catch(e){ return; }
  box.textContent = '';
  if (!shares.length){ box.append(el('div','share-empty','No shared links yet.')); return; }
  for (const sh of shares){
    const row = el('div','share-row',
      sh.scope+' · '+sh.status+' · expires '+(sh.expires_at||'').slice(0,10)+' ');
    if (sh.status === 'active'){
      const rev = el('button','share-revoke','Revoke');
      rev.type='button';
      rev.addEventListener('click', async ()=>{
        if(!confirm('Revoke this link?')) return;
        await fetch('/api/plans/'+pid+'/shares/'+sh.id, { method:'DELETE' });
        loadShareList();
      });
      row.append(rev);
    }
    box.append(row);
  }
}
function printPlan(){ window.print(); }

// ── shared links panel ──
function renderSharePanel(box){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Shared links'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','manage access'));
  box.append(ph);
  const body=el('div','share-list-panel');
  const list=el('div'); list.id='share-list';
  body.append(list);
  box.append(body);
}

// ── delete the whole holding plan ──
async function deletePlan(){
  if(!confirm('Delete this holding and all its entries? This cannot be undone.')) return;
  const r = await fetch('/api/plans/'+pid, { method:'DELETE' });
  if(r.ok){ window.location.href='/app'; return; }
  const e = await r.json().catch(()=>({}));
  alert(e.detail || e.error || 'Could not delete this holding.');
}

// ── boot ──
async function boot(){
  const me = await fetch('/api/auth/me');
  if(me.status===401){ window.location.href='/'; return; }
  const user=(await me.json()).user;
  $('ava-init').textContent=((user.display_name||'?')[0]||'?').toUpperCase();

  const r = await fetch('/api/plans/'+pid);
  if(r.status===401){ window.location.href='/'; return; }
  if(!r.ok){ window.location.href='/app'; return; }
  const d = await r.json();
  if(d.plan.type!=='holding'){ window.location.href='/app'; return; }

  const plan=d.plan, st=d.state;
  BASE = plan.currency || 'INR';
  UNIT = st.unit || '';
  document.documentElement.dataset.cur = BASE.toLowerCase();
  document.title = 'Khata — '+plan.name;
  document.querySelectorAll('#curtog button').forEach(b=>b.classList.toggle('on', b.dataset.set===BASE));

  $('name').textContent = plan.name;
  $('sub').textContent = 'Holdings · '+st.asset_class+' · '+plan.status+' · '+BASE;
  $('osub').textContent = 'on '+plan.name;

  renderHeader($('header-panel'), plan, st);
  renderPosition($('position-panel'), st);
  renderQuote($('quote-panel'), st);
  renderMembers($('members-panel'));
  renderSharePanel($('share-panel'));
  loadShareList();

  // sidebar counts from /api/plans
  try{
    const plansResp = await fetch('/api/plans').then(x=>x.json());
    const plans = plansResp.plans || [];
    const by=(t)=>plans.filter(p=>p.type===t).length||'';
    $('ct-asset').textContent=by('asset');
    $('ct-chit').textContent=by('chit');
    $('ct-loan').textContent=by('loan');
    $('ct-retirement').textContent=by('retirement');
  }catch(e){}

  // feed-gated "Refresh (live)" button
  try{
    const fc = await fetch('/api/feed/config');
    if(fc.ok){ const fcd = await fc.json().catch(()=>({})); if(fcd.enabled) $('refreshbtn').style.display=''; }
  }catch(e){}

  setTimeout(()=>document.querySelectorAll('[data-w]').forEach(b=>b.style.width=b.dataset.w+'%'),350);
}

// ── currency toggle: real base-currency switch ──
$('curtog').addEventListener('click', async (e)=>{
  const b=e.target.closest('button'); if(!b) return;
  const target=b.dataset.set;
  if(target===BASE) return;
  await fetch('/api/base-currency',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currency:target})});
  location.reload();
});

// ── buy/sell/quote wiring ──
$('act').addEventListener('change', syncFields);
$('addbtn').addEventListener('click', openOver);
$('cancel').addEventListener('click', closeOver);
$('scrim').addEventListener('click', closeOver);
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeOver(); });
$('save').addEventListener('click', async ()=>{
  $('err').textContent='';
  const a=$('act').value;
  let url, body;
  if(a==='quote'){ url='/api/plans/'+pid+'/holding/quote'; body={ price:$('price').value }; }
  else{ url='/api/plans/'+pid+(a==='buy'?'/holding/buys':'/holding/sells');
        body={ quantity:$('quantity').value, amount:$('amount').value }; }
  const r=await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if(r.ok){ closeOver(); $('quantity').value=''; $('amount').value=''; $('price').value=''; boot(); return; }
  const e=await r.json().catch(()=>({}));
  $('err').textContent = e.detail || e.error || 'Could not save.';
});

// ── feed-gated live refresh ──
$('refreshbtn').addEventListener('click', async ()=>{
  const r=await fetch('/api/plans/'+pid+'/holding/refresh-quote', { method:'POST' });
  if(r.ok){ boot(); return; }
  const e=await r.json().catch(()=>({}));
  $('sub').textContent = e.detail || e.error || 'Could not refresh price.';
});

// ── profile photo upload (localStorage, display-only) ──
mountProfileMenu();

boot();
</script>
<script src="/static/assets/nav.js" defer></script>
