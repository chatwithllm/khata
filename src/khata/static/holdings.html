<!DOCTYPE html>
<html lang="en" data-cur="inr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khata — Holdings &amp; Net Worth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/assets/app.css">
<style>
/* ── holdings.html-only rules (shell + KPI groups live in app.css) ── */
.emptypanel{padding:30px 22px;text-align:center;color:var(--ink-faint);font-size:13.5px}

/* net-worth equation readout */
.nwbody{padding:22px}
.nweq{display:flex;align-items:stretch;gap:0;border:1px solid var(--line-2);border-radius:12px;overflow:hidden}
.nweq .seg{flex:1;padding:13px 14px;text-align:center}
.nweq .seg+.seg{border-left:1px solid var(--line-2)}
.nweq .op{display:flex;align-items:center;padding:0 6px;font-family:"Fraunces",serif;font-size:20px;color:var(--ink-faint)}
.nweq .sl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:700}
.nweq .sv{font-family:"JetBrains Mono";font-weight:700;font-size:17px;margin-top:5px}
.nweq .sv.own{color:var(--pos)} .nweq .sv.owe{color:var(--neg)} .nweq .sv.net{color:var(--ink)}

/* holdings table */
.htbl{width:100%;border-collapse:collapse}
.htbl th,.htbl td{text-align:left;padding:12px 22px;border-top:1px solid var(--line-2);font-size:13.5px;vertical-align:middle}
.htbl thead th{border-top:none;border-bottom:1px solid var(--line);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:700;padding:14px 22px}
.htbl tbody tr{transition:background .2s}
.htbl tbody tr:hover{background:var(--paper-2);cursor:pointer}
.htbl td.num{font-family:"JetBrains Mono";font-weight:600;text-align:right;white-space:nowrap}
.htbl .hnm{font-weight:600;font-size:14px}
.htbl .hac{font-size:11px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:2px;text-transform:capitalize}
.gn.up{color:var(--pos)} .gn.dn{color:var(--neg)} .gn.flat{color:var(--ink-faint)}
.flag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:5px;font-family:"JetBrains Mono";background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
.qcell input{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);width:104px;transition:border-color .2s}
.qcell input:focus{outline:none;border-color:var(--primary)}

/* asset-class icon/letter (mockup .ic) */
.acic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-family:"Fraunces",serif;font-weight:600;font-size:13px;flex:none}
.acic.gold{background:linear-gradient(145deg,#E7B23B,#C8881C);color:#3a2606}
.acic.silver{background:linear-gradient(145deg,#D7DCE0,#A9B2BA);color:#2a3138}
.acic.equity{background:linear-gradient(145deg,var(--accent),var(--primary-deep));color:#fff}
.acic.cash{background:linear-gradient(145deg,var(--pos-soft),var(--pos));color:#fff}
.acic.other{background:var(--paper-2);color:var(--ink-soft)}
.hcell{display:flex;align-items:center;gap:11px}

/* gross-assets total row (mockup .foot) */
.htbl tfoot td{border-top:1px solid var(--line);background:var(--paper-2);padding:14px 22px}
.htbl tfoot .fl{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:700}
.htbl tfoot .fv{font-family:"Fraunces",serif;font-weight:600;font-size:20px;text-align:right}

/* net-worth composition: stacked bar + legend (mockup .nw .barwrap/.split) */
.compbody{padding:20px 22px;border-top:1px solid var(--line-2)}
.compbar{height:11px;border-radius:6px;background:var(--paper-2);overflow:hidden;display:flex}
.compbar i{height:100%;display:block;transition:width .9s var(--ease)}
.complegend{display:grid;gap:9px;margin-top:16px}
.complegend .sr{display:flex;align-items:center;justify-content:space-between;font-size:13px}
.complegend .sr .lbl{display:flex;align-items:center;gap:9px;color:var(--ink-soft)}
.complegend .sr .dt{width:9px;height:9px;border-radius:3px;flex:none}
.complegend .sr .pct{font-family:"JetBrains Mono";font-size:11px;color:var(--ink-faint);margin-left:4px}
.complegend .sr .amt{font-family:"JetBrains Mono";font-weight:700;font-size:13.5px}

/* hold-vs-sell decision panel (mockup .decide/.dcols) */
.hvsbody{padding:20px 22px}
.hvsform{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:6px}
@media(max-width:560px){.hvsform{grid-template-columns:repeat(2,1fr)}}
.hvsform .fld input{width:100%}
.hvsbtnrow{display:flex;align-items:center;gap:14px;margin:14px 0 4px}
.hvserr{color:var(--neg);font-size:12.5px;min-height:16px}
.dcols{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line-2);border-radius:12px;overflow:hidden;margin-top:18px}
@media(max-width:560px){.dcols{grid-template-columns:1fr}}
.dcol{padding:18px 20px}
.dcol.win{background:color-mix(in srgb,var(--pos) 7%,transparent);position:relative}
.dcol+.dcol{border-left:1px solid var(--line-2)}
@media(max-width:560px){.dcol+.dcol{border-left:none;border-top:1px solid var(--line-2)}}
.dcol .dh{font-family:"Fraunces",serif;font-weight:600;font-size:15px}
.dcol .dsub{font-size:11px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:3px}
.dline{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-top:1px solid var(--line-2);font-size:13px;margin-top:4px}
.dline:first-of-type{margin-top:12px}
.dline .dl{color:var(--ink-soft)}
.dline .dv{font-family:"JetBrains Mono";font-weight:700;font-size:13.5px}
.dline .dv.pos{color:var(--pos)} .dline .dv.neg{color:var(--neg)}
.dline.net{border-top:1.5px solid var(--ink);margin-top:8px}
.dline.net .dl{font-weight:700;color:var(--ink)}
.dline.net .dv{font-size:15px}
.wintag{position:absolute;top:12px;right:16px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:var(--pos);color:#fff}
.verdict{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 20px;border-radius:12px;margin-top:16px;background:var(--ink);color:var(--paper);flex-wrap:wrap}
.verdict .vt{font-size:11.5px;color:color-mix(in srgb,var(--paper) 62%,transparent);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.verdict .chip{display:inline-flex;align-items:center;gap:9px;font-family:"Fraunces",serif;font-weight:600;font-size:17px;margin-top:3px}
.verdict .chip .dot2{width:8px;height:8px;border-radius:50%;background:var(--pos-soft);box-shadow:0 0 10px var(--pos-soft)}
.verdict.sell .chip .dot2{background:var(--neg);box-shadow:0 0 10px var(--neg)}
.verdict .chip b{color:var(--pos-soft)}
.verdict.sell .chip b{color:var(--neg)}
.verdict .note{font-size:11px;color:color-mix(in srgb,var(--paper) 55%,transparent);font-family:"JetBrains Mono"}

/* fx + currency controls */
.ctlbody{padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.ctlrow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:700}
.fld input,.fld select{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);transition:border-color .2s}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--primary)}
.fld input{width:120px}
.setbtn{font-weight:600;font-size:14px;padding:9px 16px;border-radius:9px;background:var(--primary);color:var(--paper);border:none;cursor:pointer;box-shadow:0 8px 18px -10px var(--primary);transition:transform .2s}
.setbtn:hover{transform:translateY(-2px)}
.callout{margin-top:4px;padding:13px 15px;border:1px solid var(--line-2);border-radius:11px;background:var(--paper-2);font-size:12.5px;color:var(--ink-soft);font-family:"JetBrains Mono";line-height:1.6}
.callout.empty{color:var(--ink-faint)}
.err{color:var(--neg);font-size:13px;min-height:18px}
.manualcap{font-size:11.5px;color:var(--ink-faint);font-family:"JetBrains Mono"}
</style>
</head>

<script>
const $ = (id) => document.getElementById(id);
let BASE = "INR";

// ── currency formatting (real amounts; native columns in their own ccy, base columns in BASE) ──
function indGroup(n){n=Math.round(n);let s=Math.abs(n).toString();if(s.length>3){let l=s.slice(-3),r=s.slice(0,-3).replace(/\B(?=(\d{2})+(?!\d))/g,',');s=r+','+l;}return (n<0?'-':'')+s;}
function usGroup(n){return Math.round(n).toLocaleString('en-US');}
function sym(ccy){return ccy==='INR'?'₹':(ccy==='USD'?'$':'');}
// grouped number string (sign included), no symbol — INR uses lakh grouping, else US
function fmtNum(minor, ccy){
  if(minor===null||minor===undefined) return '—';
  const v=minor/100;
  return ccy==='INR'?indGroup(v):usGroup(v);
}

function el(tag, cls, text){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text!==undefined && text!==null) e.textContent=text;
  return e;
}
// an amount cell = <symbol><number>, all textContent (K4) — ccy defaults to BASE
function amtSpan(minor, ccy, cls){
  ccy = ccy || BASE;
  const wrap=document.createElement('span');
  if(cls) wrap.className=cls;
  if(minor===null||minor===undefined){ wrap.textContent='—'; return wrap; }
  const neg=minor<0;
  const s=el('span','symword',(neg?'-':'')+sym(ccy));
  const n=el('span',null,fmtNum(Math.abs(minor), ccy));
  wrap.append(s,n);
  return wrap;
}
// quantity micro → grouped number (e.g. 92500000 → "92.5")
function fmtMicro(q){
  if(q===null||q===undefined) return '—';
  const v=q/1e6;
  // keep up to 3 decimals, strip trailing zeros
  return v.toLocaleString('en-IN',{maximumFractionDigits:3});
}

// ── net worth hero panel ──
function renderNetWorth(box, d){
  box.textContent='';
  const ph=el('div','ph');
  ph.append(el('div','t','Net worth'), el('div','meta','assets − liabilities = net'));
  box.append(ph);

  // KPI strip (app.css .kpis/.kpi)
  const kpis=el('div','kpis');
  function kpi(cls,label,minor){
    const k=el('div','kpi'+(cls?' '+cls:''));
    k.append(el('div','l',label));
    const n=el('div','n'); n.append(amtSpan(minor)); k.append(n);
    return k;
  }
  kpis.append(
    kpi('paid','Assets', d.assets_minor),
    kpi('rem','Liabilities', d.liabilities_minor),
    kpi('','Net worth', d.net_worth_minor));
  box.append(kpis);

  // equation readout (assets − liabilities = net) — all real
  const body=el('div','nwbody');
  const eq=el('div','nweq');
  function seg(cls,label,minor){
    const s=el('div','seg');
    s.append(el('div','sl',label));
    const v=el('div','sv '+cls); v.append(amtSpan(minor)); s.append(v);
    return s;
  }
  eq.append(seg('own','Assets', d.assets_minor));
  eq.append(el('div','op','−'));
  eq.append(seg('owe','Liabilities', d.liabilities_minor));
  eq.append(el('div','op','='));
  eq.append(seg('net','Net', d.net_worth_minor));
  body.append(eq);
  box.append(body);
}

// ── holdings table panel ──
function renderHoldings(box, d){
  box.textContent='';
  const rows = d.holdings || [];
  const ph=el('div','ph');
  ph.append(el('div','t','Holdings'), el('div','meta', rows.length+(rows.length===1?' position':' positions')));
  box.append(ph);

  if(!rows.length){
    const e=el('div','emptypanel');
    e.append(document.createTextNode('No holdings yet — '));
    const a=el('a'); a.href='/create'; a.textContent='create one'; a.style.color='var(--primary-deep)'; a.style.fontWeight='600';
    e.append(a);
    box.append(e);
    return;
  }

  const tbl=el('table','htbl');
  const thead=el('thead'); const htr=el('tr');
  ['Holding','Qty','Value','Gain','In base','Quote'].forEach((h,i)=>{
    const th=el('th',null,h);
    if(i>=1 && i<=4) th.style.textAlign='right';
    htr.append(th);
  });
  thead.append(htr); tbl.append(thead);

  const tbody=el('tbody');
  for(const h of rows){
    const tr=el('tr');
    tr.addEventListener('click', ()=>{ window.location.href='/holding/'+h.id; });

    // name + asset class (with class icon/letter)
    const nameTd=el('td');
    const cell=el('div','hcell');
    cell.append(acIcon(h.asset_class));
    const txt=el('div');
    txt.append(el('div','hnm', h.name));
    txt.append(el('div','hac', h.asset_class));
    cell.append(txt);
    nameTd.append(cell);
    tr.append(nameTd);

    // qty
    tr.append(el('td','num', fmtMicro(h.qty_held_micro)));

    // current value (native ccy)
    const valTd=el('td','num'); valTd.append(amtSpan(h.current_value_minor, h.currency)); tr.append(valTd);

    // unrealized gain (native ccy), color by sign
    const gainTd=el('td','num');
    const g=h.unrealized_gain_minor;
    const gnCls = (g===null||g===undefined)?'flat':(g>0?'up':(g<0?'dn':'flat'));
    const gnWrap=amtSpan(g, h.currency, 'gn '+gnCls);
    if((g||0)>0){ gnWrap.insertBefore(document.createTextNode('+'), gnWrap.firstChild); }
    gainTd.append(gnWrap);
    tr.append(gainTd);

    // in-base — converted (already in BASE) or honest flag when null
    const baseTd=el('td','num');
    if(h.value_in_base_minor===null || h.value_in_base_minor===undefined){
      baseTd.append(el('span','flag', h.priced ? 'no rate' : 'unpriced'));
    } else {
      baseTd.append(amtSpan(h.value_in_base_minor, BASE));
    }
    tr.append(baseTd);

    // inline quote input (Enter → POST quote, then reload). Don't bubble to row nav.
    const qTd=el('td','qcell');
    const qi=el('input');
    qi.placeholder='price/unit';
    qi.dataset.id=h.id;
    qi.addEventListener('click', (e)=>e.stopPropagation());
    qi.addEventListener('keydown', async (e)=>{
      e.stopPropagation();
      if(e.key!=='Enter') return;
      const ok=await post('/api/plans/'+qi.dataset.id+'/holding/quote', { price: qi.value });
      if(ok) load();
    });
    qTd.append(qi);
    tr.append(qTd);

    tbody.append(tr);
  }
  tbl.append(tbody);

  // Gross assets total row (5.5) — uses assets_minor from /api/networth
  const tfoot=el('tfoot');
  const ftr=el('tr');
  const flTd=el('td','fl','Gross assets'); flTd.colSpan=2; ftr.append(flTd);
  const fvTd=el('td','fv'); fvTd.colSpan=4; fvTd.append(amtSpan(d.assets_minor, BASE)); ftr.append(fvTd);
  tfoot.append(ftr); tbl.append(tfoot);

  box.append(tbl);
}

// asset-class icon/letter — short Fraunces label per class (mockup .ic)
function acIcon(ac){
  const cls=(ac||'other').toLowerCase();
  const known={gold:'gold',silver:'silver',equity:'equity',cash:'cash'};
  const letters={gold:'Au',silver:'Ag',equity:'Eq',cash:'₹'};
  const key=known[cls]?cls:'other';
  const txt=letters[cls] || (ac?ac[0].toUpperCase():'?');
  return el('span','acic '+key, txt);
}

// ── currency + FX controls panel ──
function renderControls(box, d, feedEnabled){
  box.textContent='';
  const ph=el('div','ph');
  ph.append(el('div','t','Currency & FX'), el('div','meta','base + manual rates'));
  box.append(ph);

  const body=el('div','ctlbody');

  // base currency
  const r1=el('div','ctlrow');
  const baseFld=el('div','fld');
  baseFld.append(el('label',null,'Base currency'));
  const baseSel=el('select'); baseSel.id='base';
  [['INR','INR ₹'],['USD','USD $']].forEach(([v,t])=>{ const o=el('option',null,t); o.value=v; baseSel.append(o); });
  baseSel.value=BASE;
  baseSel.addEventListener('change', async ()=>{
    if(await post('/api/base-currency', { currency: baseSel.value })) location.reload();
  });
  baseFld.append(baseSel);
  r1.append(baseFld);
  body.append(r1);

  // fx rate: 1 <quote> = <rate> BASE
  const r2=el('div','ctlrow');
  const qFld=el('div','fld');
  qFld.append(el('label',null,'FX — 1 of'));
  const fxq=el('select'); fxq.id='fxq';
  // only the NON-base currency is a valid quote (base==quote is rejected); default to it
  ['USD','INR'].filter(c=>c!==BASE).forEach(c=>{ const o=el('option',null,c); o.value=c; fxq.append(o); });
  qFld.append(fxq);
  r2.append(qFld);

  const rFld=el('div','fld');
  const rl=el('label'); rl.append(document.createTextNode('= rate in '));
  const bb=el('b'); bb.textContent=BASE; rl.append(bb);
  rFld.append(rl);
  const fxr=el('input'); fxr.id='fxr'; fxr.placeholder='83.42'; fxr.inputMode='decimal';
  rFld.append(fxr);
  r2.append(rFld);

  const setBtn=el('button','setbtn','Set rate');
  setBtn.addEventListener('click', async ()=>{
    if(await post('/api/fx-rates', { quote: fxq.value, rate: fxr.value })){ fxr.value=''; load(); }
  });
  r2.append(setBtn);
  body.append(r2);

  const errEl=el('div','err',''); errEl.id='err'; body.append(errEl);

  // honest callout: unpriced count + unconverted per-currency balances
  const callout=el('div','callout');
  const bits=[];
  const unpriced=d.unpriced||[];
  if(unpriced.length) bits.push(unpriced.length+' unpriced holding'+(unpriced.length===1?'':'s')+' — set a quote to value');
  const unconv=d.unconverted||{};
  for(const [ccy,b] of Object.entries(unconv)){
    bits.push('Unconverted '+ccy+': '+sym(ccy)+fmtNum(b.assets_minor,ccy)+' assets / '+sym(ccy)+fmtNum(b.liabilities_minor,ccy)+' liab — set a '+ccy+' rate');
  }
  if(!bits.length){
    callout.classList.add('empty');
    callout.textContent='Everything priced and converted into '+BASE+'.';
  } else {
    bits.forEach((t,i)=>{ if(i) callout.append(el('br')); callout.append(document.createTextNode(t)); });
  }
  body.append(callout);

  // live-feed gating — only show "live" affordance hint when the feed is enabled.
  // The mockup's decorative spot-price ticker is NOT rendered: those market numbers
  // are data we don't have. When disabled (default), state honestly that quotes are manual.
  const cap=el('div','manualcap');
  cap.textContent = feedEnabled
    ? 'Live feed enabled — quotes can refresh from the market feed.'
    : 'Quotes are entered manually (no live market feed).';
  body.append(cap);

  box.append(body);
}

// ── net-worth composition panel (5.3) ──
// Client-side derived from real data: one segment per holding's value_in_base_minor
// (fallback to current_value_minor when no base rate), plus a Liabilities segment
// computed as liabilities_minor. Percentages are honest, over (assets + liabilities).
const SEG_COLORS=['var(--primary)','var(--accent)','var(--pos)','var(--accent-dk)','var(--primary-deep)','var(--pos-soft)','var(--ink-faint)'];
function renderComposition(box, d){
  box.textContent='';
  const ph=el('div','ph');
  ph.append(el('div','t','Composition'), el('div','meta','assets + liabilities'));
  box.append(ph);

  const holds=d.holdings||[];
  // build segments from real holding values (base-converted when available)
  const segs=[];
  holds.forEach((h,i)=>{
    const v = (h.value_in_base_minor!==null && h.value_in_base_minor!==undefined)
      ? h.value_in_base_minor : h.current_value_minor;
    if(v===null || v===undefined) return;            // skip values we don't have
    segs.push({ label:h.name, minor:v, color:SEG_COLORS[i%SEG_COLORS.length], neg:false });
  });
  const liab=d.liabilities_minor||0;
  if(liab>0) segs.push({ label:'Liabilities', minor:liab, color:'var(--neg)', neg:true });

  if(!segs.length){
    const e=el('div','emptypanel','Nothing to compose yet.');
    box.append(e); return;
  }

  const total=segs.reduce((s,x)=>s+x.minor,0);
  const body=el('div','compbody');

  // stacked bar
  const bar=el('div','compbar');
  segs.forEach(s=>{
    const i=el('i'); i.style.background=s.color; i.style.width='0';
    i.dataset.w = total? (s.minor/total*100) : 0;
    bar.append(i);
  });
  body.append(bar);

  // legend with honest derived percentages
  const legend=el('div','complegend');
  segs.forEach(s=>{
    const sr=el('div','sr');
    const lbl=el('div','lbl');
    const dt=el('span','dt'); dt.style.background=s.color; lbl.append(dt);
    lbl.append(document.createTextNode(s.label));
    const pct=el('span','pct', total? (s.minor/total*100).toFixed(1)+'%':'—');
    lbl.append(pct);
    sr.append(lbl);
    const amt=el('div','amt');
    if(s.neg){ amt.append(document.createTextNode('−')); amt.style.color='var(--neg)'; }
    amt.append(amtSpan(s.minor, BASE));
    sr.append(amt);
    legend.append(sr);
  });
  body.append(legend);
  box.append(body);

  // animate widths after paint
  requestAnimationFrame(()=>{ bar.querySelectorAll('i').forEach(i=>{ i.style.width=i.dataset.w+'%'; }); });
}

// ── hold vs sell analysis panel (5.4) — wired to /api/analysis/hold-vs-sell ──
function renderHoldVsSell(box, d){
  box.textContent='';
  const ph=el('div','ph');
  ph.append(el('div','t','Hold vs sell'), el('div','meta','borrow against an asset, or sell it'));
  box.append(ph);

  const body=el('div','hvsbody');

  // seed inputs from real data: largest priced holding + real liabilities
  const holds=(d.holdings||[]).slice().sort((a,b)=>(b.current_value_minor||0)-(a.current_value_minor||0));
  const top=holds[0];
  const seedAsset = top ? (top.current_value_minor/100) : '';
  const seedBorrow = d.liabilities_minor ? (d.liabilities_minor/100) : '';

  const form=el('div','hvsform');
  function field(label,id,val,ph2){
    const f=el('div','fld');
    f.append(el('label',null,label));
    const inp=el('input'); inp.id=id; inp.inputMode='decimal'; inp.placeholder=ph2;
    if(val!=='' && val!==undefined && val!==null) inp.value=val;
    f.append(inp);
    return f;
  }
  form.append(
    field('Asset value ('+sym(BASE)+')','hvs-asset', seedAsset, '625140'),
    field('Appreciation % / yr','hvs-appr', '8', '8'),
    field('Borrow amount ('+sym(BASE)+')','hvs-borrow', seedBorrow, '431164'),
    field('Interest % / yr','hvs-int', '8.5', '8.5'),
    field('Horizon (months)','hvs-horizon', '18', '18'));
  body.append(form);

  const btnRow=el('div','hvsbtnrow');
  const btn=el('button','setbtn','Analyse');
  btnRow.append(btn);
  const errEl=el('div','hvserr',''); btnRow.append(errEl);
  body.append(btnRow);

  const out=el('div'); out.id='hvs-out'; body.append(out);
  box.append(body);

  async function run(){
    errEl.textContent='';
    const av=parseFloat($('hvs-asset').value);
    const ap=parseFloat($('hvs-appr').value);
    const bo=parseFloat($('hvs-borrow').value);
    const it=parseFloat($('hvs-int').value);
    const ho=parseInt($('hvs-horizon').value,10);
    if([av,ap,bo,it].some(x=>isNaN(x)) || isNaN(ho)){ errEl.textContent='Fill all fields with numbers.'; return; }
    // send raw major amounts — the API's to_minor scales to minor units (×100).
    // (pre-multiplying here AND server-side double-scaled the value 100×.)
    const qs=new URLSearchParams({
      asset_value:$('hvs-asset').value.trim(),
      appreciation:String(ap),
      borrow:$('hvs-borrow').value.trim(),
      interest:String(it),
      horizon:String(ho)
    });
    const r=await fetch('/api/analysis/hold-vs-sell?'+qs.toString());
    if(r.status===401){ window.location.href='/'; return; }
    if(!r.ok){ const e=await r.json().catch(()=>({})); errEl.textContent=e.detail||e.error||'Analysis failed.'; return; }
    const res=await r.json();
    renderHvsResult(out, res, ho);
  }
  btn.addEventListener('click', run);
  run(); // initial computation from seeded inputs
}

function renderHvsResult(out, r, horizon){
  out.textContent='';
  const adv=r.net_hold_advantage_minor||0;
  const holdWins=(r.verdict==='hold') || adv>0;

  const cols=el('div','dcols');

  // Hold & borrowed
  const c1=el('div','dcol'+(holdWins?' win':''));
  if(holdWins){ c1.append(el('span','wintag','recommended')); }
  c1.append(el('div','dh','Hold & borrowed'));
  c1.append(el('div','dsub','kept the asset · borrowed against it'));
  c1.append(dline('Asset value today', r.asset_value_minor, null));
  c1.append(dline('Appreciation ('+horizon+' mo)', r.appreciation_gain_minor, 'pos', '+'));
  c1.append(dline('Interest cost', r.interest_cost_minor, 'neg', '−'));
  c1.append(dline('Future value', r.future_value_minor, null, '', true));

  // Sold instead — mirror framing
  const c2=el('div','dcol'+(holdWins?'':' win'));
  if(!holdWins){ c2.append(el('span','wintag','recommended')); }
  c2.append(el('div','dh','Sold instead'));
  c2.append(el('div','dsub','sold now · no loan, no upside'));
  c2.append(dline('Cash from sale', r.asset_value_minor, null));
  c2.append(dline('Appreciation forgone', r.appreciation_gain_minor, 'neg', '−'));
  c2.append(dline('Interest saved', r.interest_cost_minor, 'pos', '+'));
  c2.append(dline('Net outcome vs hold', adv, holdWins?'neg':'pos', holdWins?'−':'+', true));

  cols.append(c1, c2);
  out.append(cols);

  // verdict bar (real verdict + real net advantage)
  const v=el('div','verdict'+(holdWins?'':' sell'));
  const left=el('div');
  left.append(el('div','vt','Verdict'));
  const chip=el('div','chip');
  chip.append(el('span','dot2'));
  chip.append(document.createTextNode(holdWins?'Holding wins by ':'Selling wins by '));
  const b=el('b'); b.append(amtSpan(Math.abs(adv), BASE)); chip.append(b);
  left.append(chip);
  v.append(left);
  v.append(el('div','note','net hold advantage = appreciation gain − interest cost'));
  out.append(v);
}

function dline(label, minor, cls, sign, isNet){
  const r=el('div','dline'+(isNet?' net':''));
  r.append(el('span','dl',label));
  const dv=el('span','dv'+(cls?' '+cls:''));
  if(sign) dv.append(document.createTextNode(sign));
  dv.append(amtSpan(Math.abs(minor), BASE));
  r.append(dv);
  return r;
}

// ── POST helper ──
async function post(path, payload){
  const errEl=$('err');
  if(errEl) errEl.textContent='';
  const r=await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  if(r.status===401){ window.location.href='/'; return false; }
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    if(errEl) errEl.textContent = e.detail || e.error || 'Failed.';
  }
  return r.ok;
}

// ── boot/load ──
async function load(){
  const me = await fetch('/api/auth/me');
  if(me.status===401){ window.location.href='/'; return; }
  const user=(await me.json()).user;
  $('ava-init').textContent=((user.display_name||'?')[0]||'?').toUpperCase();

  const r = await fetch('/api/networth');
  if(r.status===401){ window.location.href='/'; return; }
  const d = await r.json();

  BASE = d.base_currency || 'INR';
  document.documentElement.dataset.cur = BASE.toLowerCase();
  document.querySelectorAll('#curtog button').forEach(b=>b.classList.toggle('on', b.dataset.set===BASE));

  // live-feed config gate (default disabled → no decorative ticker)
  let feedEnabled=false;
  try{ const fc=await fetch('/api/feed/config'); if(fc.ok){ feedEnabled = (await fc.json()).enabled===true; } }catch(e){}

  renderNetWorth($('nw-panel'), d);
  renderHoldings($('hold-panel'), d);
  renderComposition($('comp-panel'), d);
  renderControls($('ctl-panel'), d, feedEnabled);
  renderHoldVsSell($('hvs-panel'), d);

  // sidebar live counts from /api/plans
  try{
    const plansResp = await fetch('/api/plans').then(x=>x.json());
    const plans = plansResp.plans || [];
    const by=(t)=>plans.filter(p=>p.type===t).length||'';
    $('ct-asset').textContent=by('asset');
    $('ct-chit').textContent=by('chit');
    $('ct-loan').textContent=by('loan');
    $('ct-retirement').textContent=by('retirement');
  }catch(e){}
}

// ── currency toggle: real base-currency switch + reload ──
$('curtog').addEventListener('click', async (e)=>{
  const b=e.target.closest('button'); if(!b) return;
  const target=b.dataset.set;
  if(target===BASE) return;
  await fetch('/api/base-currency',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currency:target})});
  location.reload();
});

load();
</script>
