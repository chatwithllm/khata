<!DOCTYPE html>
<html lang="en" data-cur="inr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khata — Chit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/assets/ledger.css">
<style>
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0}
  .topbar .brand{display:flex;align-items:center;gap:10px;font-family:"Fraunces",serif;font-weight:600;font-size:20px}
  .topbar .glyph{width:26px;height:26px;border-radius:7px;background:linear-gradient(145deg,var(--primary),var(--primary-deep))}
  .head{display:flex;align-items:flex-end;justify-content:space-between;margin:8px 0 16px;gap:12px}
  .head h1{font-family:"Fraunces",serif;font-weight:600;font-size:30px}
  .head .meta{font-size:13px;color:var(--ink-faint)}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:10px}
  @media(max-width:680px){.cards{grid-template-columns:1fr}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-faint);font-weight:700}
  .stat .v{font-family:"Fraunces",serif;font-size:24px;margin-top:6px}
  .stat .v.pos{color:var(--pos)} .stat .v.neg{color:var(--neg)}
  .statusline{font-size:13px;color:var(--ink-soft);margin-bottom:18px}
  .sec{margin:22px 0}
  .sec h2{font-family:"Fraunces",serif;font-weight:600;font-size:18px;margin-bottom:10px}
  .calc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
  .calc .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .calc input{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink)}
  .calc .out{margin-top:10px;font-size:14px;color:var(--ink-soft);min-height:18px}
  .calc .out.err{color:var(--neg)}
  .led{width:100%;border-collapse:collapse}
  .led th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--line)}
  .led td{padding:9px 10px;border-bottom:1px solid var(--line-2);font-size:14px}
  .led td.amt{font-family:"JetBrains Mono";text-align:right}
  .led .dir-in{color:var(--pos)} .led .dir-out{color:var(--neg)}
  .ledempty{color:var(--ink-faint);padding:16px;text-align:center}
  .modal{position:fixed;inset:0;background:rgba(20,16,12,.45);display:none;align-items:center;justify-content:center;z-index:50}
  .modal.on{display:flex}
  .sheet{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;width:min(440px,92vw);box-shadow:var(--shadow)}
  .sheet h3{font-family:"Fraunces",serif;font-size:20px;margin-bottom:12px}
  .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .fld label{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:700}
  .fld input,.fld select{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink)}
  .err{color:var(--neg);font-size:13px;min-height:18px}
  .acts{display:flex;gap:10px;align-items:center;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="brand" href="/app"><span class="glyph"></span> Khata</a>
    <a class="link" href="/app">← Back to app</a>
  </div>
  <div class="head">
    <div><h1 id="name">Chit</h1><div class="meta" id="meta">—</div></div>
    <button class="btn" id="actbtn">Add entry</button>
  </div>
  <div class="cards">
    <div class="stat"><div class="k">Net position</div><div class="v mono" id="net">—</div></div>
    <div class="stat"><div class="k">Prize received</div><div class="v mono" id="prize">—</div></div>
    <div class="stat"><div class="k">Net contributed</div><div class="v mono" id="netcontrib">—</div></div>
  </div>
  <div class="statusline" id="statusline"></div>

  <div class="sec">
    <h2>Dividend calculator</h2>
    <div class="calc">
      <div class="row">
        <div class="fld" style="margin-bottom:0"><label>Winning bid</label><input id="bid" placeholder="1,00,000"></div>
        <button class="btn" id="calc">Calc</button>
      </div>
      <div class="out" id="calcout"></div>
    </div>
  </div>

  <div class="sec">
    <h2>Ledger</h2>
    <div id="ledger"></div>
  </div>

  <div class="sec"><div id="sharing"></div></div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3>Add chit entry</h3>
    <div class="fld"><label>Kind</label>
      <select id="kind">
        <option value="chit_contribution">Contribution</option>
        <option value="chit_dividend">Dividend received</option>
        <option value="chit_prize">Prize received</option>
      </select>
    </div>
    <div class="fld"><label>Amount</label><input id="amount" placeholder="50,000"></div>
    <div class="fld"><label>Note (optional)</label><input id="note" placeholder="month 3"></div>
    <div class="err" id="err"></div>
    <div class="acts"><button class="btn" id="save">Save</button><a class="link" id="cancel">Cancel</a></div>
  </div>
</div>

<script src="/static/assets/sharing.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const SYM = { INR: "₹", USD: "$" };
  const pid = parseInt(location.pathname.split("/").pop(), 10);
  let currency = "INR";

  const KIND_LABEL = { chit_contribution: "Contribution", chit_dividend: "Dividend received", chit_prize: "Prize received" };

  function fmtMinor(m, ccy) {
    if (m === null || m === undefined) return "—";
    const neg = m < 0, v = Math.abs(m) / 100;
    return (neg ? "-" : "") + (SYM[ccy] || "") + v.toLocaleString("en-IN", { minimumFractionDigits: 2 });
  }

  function renderLedger(rows) {
    const box = $("ledger");
    box.textContent = "";
    if (!rows || !rows.length) {
      const e = document.createElement("div"); e.className = "ledempty";
      e.textContent = "No entries yet."; box.appendChild(e); return;
    }
    const table = document.createElement("table"); table.className = "led";
    const thead = document.createElement("thead"); const htr = document.createElement("tr");
    for (const h of ["Kind", "Direction", "Amount", "Date"]) {
      const th = document.createElement("th"); th.textContent = h; htr.appendChild(th);
    }
    thead.appendChild(htr); table.appendChild(thead);
    const tbody = document.createElement("tbody");
    for (const e of rows) {
      const tr = document.createElement("tr");
      const tdK = document.createElement("td"); tdK.textContent = KIND_LABEL[e.kind] || e.kind;
      const tdD = document.createElement("td"); tdD.textContent = e.direction;
      tdD.className = e.direction === "in" ? "dir-in" : "dir-out";
      const tdA = document.createElement("td"); tdA.className = "amt"; tdA.textContent = fmtMinor(e.amount_minor, currency);
      const tdT = document.createElement("td"); tdT.textContent = (e.occurred_at || "").slice(0, 10);
      tr.append(tdK, tdD, tdA, tdT); tbody.appendChild(tr);
    }
    table.appendChild(tbody); box.appendChild(table);
  }

  async function load() {
    const r = await fetch("/api/plans/" + pid);
    if (r.status === 401) { window.location.href = "/"; return; }
    if (!r.ok) { window.location.href = "/app"; return; }
    const d = await r.json();
    if (d.plan.type !== "chit") { window.location.href = "/app"; return; }
    currency = d.plan.currency;
    const st = d.state, p = d.plan;
    $("name").textContent = p.name;
    $("meta").textContent = "chit · " + currency + " · " + p.status;

    const n = $("net"); n.textContent = fmtMinor(st.net_position_minor, currency);
    n.classList.toggle("pos", (st.net_position_minor || 0) > 0);
    n.classList.toggle("neg", (st.net_position_minor || 0) < 0);
    $("prize").textContent = fmtMinor(st.prize_received_minor, currency);
    $("netcontrib").textContent = fmtMinor(st.net_contributed_minor, currency);

    $("statusline").textContent = "Subscription " + fmtMinor(st.subscription_minor, currency) + "/mo"
      + " · " + st.months_recorded + "/" + st.n_members + " months"
      + " · commission " + (st.commission_bps / 100) + "%"
      + " · " + (st.won ? "won the pot" : "not won yet");

    renderLedger(st.ledger);
    mountSharing(pid, $("sharing"));
  }

  $("calc").addEventListener("click", async () => {
    const out = $("calcout"); out.classList.remove("err"); out.textContent = "";
    const r = await fetch("/api/plans/" + pid + "/chit/dividend?bid=" + encodeURIComponent($("bid").value));
    if (r.status === 401) { window.location.href = "/"; return; }
    const d = await r.json().catch(() => ({}));
    if (!r.ok) { out.classList.add("err"); out.textContent = d.detail || d.error || "Could not calculate."; return; }
    out.textContent = "Dividend/member " + fmtMinor(d.dividend_per_member_minor, currency)
      + " · prize " + fmtMinor(d.prize_minor, currency);
  });

  $("actbtn").addEventListener("click", () => { $("err").textContent = ""; $("modal").classList.add("on"); });
  $("cancel").addEventListener("click", () => $("modal").classList.remove("on"));
  $("save").addEventListener("click", async () => {
    $("err").textContent = "";
    const body = { kind: $("kind").value, amount: $("amount").value };
    if ($("note").value) body.note = $("note").value;
    const r = await fetch("/api/plans/" + pid + "/chit/entries",
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    if (r.ok) { $("modal").classList.remove("on"); $("amount").value = ""; $("note").value = ""; load(); return; }
    const e = await r.json().catch(() => ({})); $("err").textContent = e.detail || e.error || "Could not save.";
  });

  load();
</script>
</body>
</html>
