<!DOCTYPE html>
<html lang="en" data-cur="inr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khata — Chit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/assets/app.css">
<style>
/* ── chit-detail.html-only rules (shell + shared groups live in app.css) ── */
.emptypanel{padding:30px 22px;text-align:center;color:var(--ink-faint);font-size:13.5px}

/* header KPI accents */
.kpi.pos .n{color:var(--pos)} .kpi.neg .n{color:var(--neg)}
.wonbadge{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:color-mix(in srgb,var(--pos) 18%,transparent);color:var(--pos);padding:3px 9px;border-radius:20px;margin-left:8px}

/* auction rounds strip */
.chit-body{padding:20px 22px}
.rounds{display:flex;gap:6px;margin:4px 0 14px;flex-wrap:wrap}
.rd{flex:1;min-width:26px;height:46px;border-radius:8px;background:var(--paper-2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-family:"JetBrains Mono";color:var(--ink-faint);position:relative;border:1px solid var(--line-2)}
.rd.done{background:color-mix(in srgb,var(--pos) 14%,transparent);color:var(--pos);border-color:transparent}
.rd.now{background:var(--paper);border-color:var(--primary);color:var(--primary-deep)}
.rd .r{font-weight:700;font-size:11px}
.rd .wm{position:absolute;top:3px;right:4px;font-size:9px;color:var(--pos)}
.rounds-legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-faint);font-family:"JetBrains Mono"}
.rounds-legend span{display:inline-flex;align-items:center;gap:6px}
.dotk{width:10px;height:10px;border-radius:50%;display:inline-block}

/* my-position breakdown */
.bd{padding:20px 22px}
.bd .brow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line-2)}
.bd .brow:first-child{padding-top:4px}
.bd .blab{font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;gap:9px}
.bd .blab .ic{width:8px;height:8px;border-radius:2px;flex:none}
.bd .bamt{font-family:"JetBrains Mono";font-weight:700;font-size:14.5px}
.bd .bamt.out{color:var(--neg)}.bd .bamt.in{color:var(--pos)}
.bd .net{display:flex;align-items:flex-end;justify-content:space-between;padding-top:16px;margin-top:4px}
.bd .net .l{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:600}
.bd .net .v{font-family:"Fraunces",serif;font-weight:600;font-size:32px;line-height:1;margin-top:5px}
.bd .net .v.pos{color:var(--pos)} .bd .net .v.neg{color:var(--neg)}

/* ledger */
.led{padding:6px 0}
.led .lrow{display:grid;grid-template-columns:30px 1fr auto;gap:12px;align-items:center;padding:12px 22px;border-top:1px solid var(--line-2)}
.led .lrow:first-child{border-top:none}
.led .ldot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;font-family:"JetBrains Mono"}
.led .ldot.in{background:color-mix(in srgb,var(--pos) 16%,transparent);color:var(--pos)}
.led .ldot.out{background:color-mix(in srgb,var(--neg) 14%,transparent);color:var(--neg)}
.led .li .nm{font-weight:600;font-size:14px}
.led .li .mt{font-size:11.5px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:2px}
.led .lamt{font-family:"JetBrains Mono";font-weight:700;font-size:14px;text-align:right;white-space:nowrap}
.led .lamt.in{color:var(--pos)} .led .lamt.out{color:var(--ink)}

/* net-position mini chart (derived from ledger cumulative) */
.chartwrap{padding:18px 22px 6px}
.chart{width:100%;height:auto;display:block;overflow:visible}
.chart .grid-l{stroke:var(--line-2);stroke-width:1}
.chart .zero{stroke:var(--ink-faint);stroke-width:1;stroke-dasharray:3 4;opacity:.7}
.chart .area{fill:url(#netfill);opacity:.9}
.chart .ln{fill:none;stroke:var(--primary);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.chart .axe{font-family:"JetBrains Mono";font-size:8.5px;fill:var(--ink-faint)}
.chartcap{display:flex;gap:18px;flex-wrap:wrap;padding:4px 22px 16px;font-size:11.5px;color:var(--ink-faint);font-family:"JetBrains Mono"}
.chartcap span{display:inline-flex;align-items:center;gap:6px}
.swatch{width:14px;height:3px;border-radius:2px;display:inline-block}

/* terms */
.terms{padding:6px 0}
.terms .trow{display:flex;justify-content:space-between;align-items:center;padding:11px 22px;border-top:1px solid var(--line-2);font-size:13.5px}
.terms .trow:first-child{border-top:none}
.terms .trow .tk{color:var(--ink-faint)}
.terms .trow .tv{font-family:"JetBrains Mono";font-weight:600;text-align:right}

/* slide-over (copied from loan-detail pattern) */
.scrim{position:fixed;inset:0;background:rgba(20,16,12,.45);opacity:0;visibility:hidden;transition:opacity .3s var(--ease),visibility .3s;z-index:40}
.scrim.on{opacity:1;visibility:visible}
.over{position:fixed;top:0;right:0;bottom:0;width:min(440px,94vw);background:var(--card);border-left:1px solid var(--line);box-shadow:-24px 0 60px -30px rgba(28,24,19,.5);transform:translateX(100%);transition:transform .42s var(--ease);z-index:45;display:flex;flex-direction:column;overflow-y:auto}
.over.on{transform:none}
.over .oh{padding:24px 26px 18px;border-bottom:1px solid var(--line)}
.over .eyebrow{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.over .oh h3{font-family:"Fraunces",serif;font-weight:600;font-size:24px;margin-top:6px;letter-spacing:-.01em}
.over .oh h3 em{font-style:italic;color:var(--primary-deep)}
.over .osub{font-size:12.5px;color:var(--ink-faint);font-family:"JetBrains Mono";margin-top:6px}
.over .obody{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:700}
.fld input,.fld select{font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);transition:border-color .2s}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--primary)}
.err{color:var(--neg);font-size:13px;min-height:18px}
.acts{display:flex;gap:12px;align-items:center;margin-top:4px}
.acts .save{font-weight:600;font-size:14px;padding:10px 18px;border-radius:10px;background:var(--primary);color:var(--paper);border:none;cursor:pointer;box-shadow:0 8px 18px -10px var(--primary);transition:transform .2s}
.acts .save:hover{transform:translateY(-2px)}
.acts .cancel{font-weight:600;font-size:14px;color:var(--ink-faint);cursor:pointer}
.acts .cancel:hover{color:var(--ink)}
</style>
</head>

<script src="/static/assets/sharing.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const pid = parseInt(location.pathname.split("/").pop(), 10);
let BASE = "INR";

// ── currency formatting (real amounts already in BASE; no client-side conversion) ──
function indGroup(n){n=Math.round(n);let s=Math.abs(n).toString();if(s.length>3){let l=s.slice(-3),r=s.slice(0,-3).replace(/\B(?=(\d{2})+(?!\d))/g,',');s=r+','+l;}return (n<0?'-':'')+s;}
function usGroup(n){return Math.round(n).toLocaleString('en-US');}
function sym(ccy){return ccy==='INR'?'₹':'$';}
function fmtNum(minor, ccy){
  if(minor===null||minor===undefined) return '—';
  const v=minor/100;
  return ccy==='INR'?indGroup(v):usGroup(v);
}

function el(tag, cls, text){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text!==undefined && text!==null) e.textContent=text;
  return e;
}
// an amount cell = <symbol><number>, all textContent (K4)
function amtSpan(minor, cls){
  const wrap=document.createElement('span');
  if(cls) wrap.className=cls;
  if(minor===null||minor===undefined){ wrap.textContent='—'; return wrap; }
  const neg=minor<0;
  const s=document.createElement('span'); s.className='symword'; s.textContent=(neg?'-':'')+sym(BASE);
  const n=document.createElement('span'); n.textContent=fmtNum(Math.abs(minor), BASE);
  wrap.append(s,n);
  return wrap;
}

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(iso){
  if(!iso) return '—';
  const parts=String(iso).split('T')[0].split('-');
  if(parts.length<3) return iso;
  const y=parts[0], mi=parseInt(parts[1],10)-1, d=parseInt(parts[2],10);
  return d+' '+(MONTHS[mi]||'?')+' '+y;
}
const KIND_LABEL = { chit_contribution: "Contribution", chit_dividend: "Dividend", chit_prize: "Prize" };

// ── header KPIs ──
function renderHeader(box, plan, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t'); t.append(el('span','tag chit','Chit'), document.createTextNode(' '));
  const nm=el('span'); nm.textContent=plan.name; t.append(nm);
  if(st.won) t.append(el('span','wonbadge','Prize won'));
  const commPct=(st.commission_bps/100);
  const metaBits=[st.n_members+'-member', commPct+'% commission'];
  ph.append(t, el('div','meta', metaBits.join(' · ')));
  box.append(ph);

  const kpis=el('div','kpis');
  function kpi(cls,label,minor){
    const k=el('div','kpi'+(cls?' '+cls:''));
    k.append(el('div','l',label));
    const n=el('div','n'); n.append(amtSpan(minor)); k.append(n);
    return k;
  }
  const netCls = (st.net_position_minor||0) > 0 ? 'pos' : ((st.net_position_minor||0) < 0 ? 'neg' : '');
  kpis.append(
    kpi('','Chit value',st.chit_value_minor),
    kpi(netCls,'My net position',st.net_position_minor),
    kpi('','Net contributed',st.net_contributed_minor));
  box.append(kpis);

  // subscription/commission caption line
  const head=el('div','planhead');
  const row=el('div','row');
  const lcap=el('span');
  lcap.append(document.createTextNode('subscription '));
  lcap.append(amtSpan(st.subscription_minor));
  lcap.append(document.createTextNode('/mo'));
  row.append(lcap);
  row.append(el('span', null, st.months_recorded+' of '+st.n_members+' rounds recorded'));
  head.append(row);
  box.append(head);
}

// ── auction rounds strip (months_recorded of n_members; no per-round winner/bid) ──
function renderRounds(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Auction rounds'); t.style.fontSize='16px';
  ph.append(t, el('div','meta', st.months_recorded+' of '+st.n_members+' recorded'));
  box.append(ph);
  const body=el('div','chit-body');
  const rounds=el('div','rounds');
  const n=st.n_members||0, rec=st.months_recorded||0, won=!!st.won;
  for(let k=1;k<=n;k++){
    let cls='rd';
    if(k<=rec) cls='rd done';
    else if(k===rec+1) cls='rd now';
    const rd=el('div',cls);
    rd.append(el('span','r',String(k)));
    if(k===rec+1 && k<=n) rd.append(document.createTextNode('next'));
    else if(k<=rec) rd.append(document.createTextNode('done'));
    rounds.append(rd);
  }
  // Per-round winner is NOT tracked — only the aggregate `won` flag exists.
  // Do not pin a star to any specific round (would fabricate which round was won);
  // the aggregate win is surfaced via the legend badge + the header "Prize won" badge.
  body.append(rounds);
  const legend=el('div','rounds-legend');
  function lg(color,label){ const s=el('span'); s.append(el('i','dotk'), document.createTextNode(label)); s.firstChild.style.background=color; return s; }
  legend.append(lg('var(--pos)','recorded'));
  legend.append(lg('var(--primary)','next'));
  legend.append(lg('var(--paper-2)','upcoming'));
  if(won) legend.append(el('span', null, '★ you won a round'));
  body.append(legend);
  box.append(body);
}

// ── my position breakdown ──
function renderPosition(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','My position'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','contributed vs received'));
  box.append(ph);
  const body=el('div','bd');
  function brow(color, label, minor, dirCls){
    const r=el('div','brow');
    const lab=el('div','blab'); const ic=el('span','ic'); ic.style.background=color; lab.append(ic, document.createTextNode(label));
    const amt=el('div','bamt '+dirCls);
    amt.append(amtSpan(minor));
    r.append(lab, amt);
    return r;
  }
  body.append(brow('var(--neg)','Total contributed', st.total_contributed_minor, 'out'));
  body.append(brow('var(--pos-soft)','Dividends earned', st.total_dividends_minor, 'in'));
  body.append(brow('var(--pos)','Prize received', st.prize_received_minor, 'in'));
  const net=el('div','net');
  const left=el('div');
  left.append(el('div','l','Net position'));
  const npCls = (st.net_position_minor||0) > 0 ? 'pos' : ((st.net_position_minor||0) < 0 ? 'neg' : '');
  const v=el('div','v '+npCls); v.append(amtSpan(st.net_position_minor)); left.append(v);
  net.append(left);
  body.append(net);
  box.append(body);
}

// ── ledger (the one detail page with a real ledger) ──
function renderLedger(box, st){
  box.textContent='';
  const rows = st.ledger || [];
  const ph=el('div','ph');
  const t=el('div','t','Ledger'); t.style.fontSize='16px';
  ph.append(t, el('div','meta', rows.length+' entries'));
  box.append(ph);
  if(!rows.length){ box.append(el('div','emptypanel','No entries yet.')); return; }
  const body=el('div','led fillrows');
  for(const e of rows){
    const r=el('div','lrow');
    const dir=e.direction;
    const dot=el('div','ldot '+(dir==='in'?'in':'out')); dot.textContent = dir==='in'?'+':'−';
    const li=el('div','li');
    // meta line: date · note (note rendered via textContent, K4)
    const mt=el('div','mt'); mt.textContent = e.note ? (fmtDate(e.occurred_at)+' · '+e.note) : fmtDate(e.occurred_at);
    li.append(el('div','nm', KIND_LABEL[e.kind] || e.kind), mt);
    const amt=el('div','lamt '+(dir==='in'?'in':'out'));
    const pfx = dir==='in' ? '+' : '−';
    const aw=document.createElement('span');
    const ss=el('span','symword'); ss.textContent=pfx+sym(BASE); aw.append(ss);
    const nn=el('span'); nn.textContent=fmtNum(Math.abs(e.amount_minor), BASE); aw.append(nn);
    amt.append(aw);
    r.append(dot, li, amt);
    body.append(r);
  }
  box.append(body);
}

// ── net position over rounds (mini chart) — derived: cumulative net from ledger ──
function renderChart(box, st){
  box.textContent='';
  const rows = (st.ledger || []).slice().sort((a,b)=>String(a.occurred_at).localeCompare(String(b.occurred_at)));
  if(rows.length < 2){ box.style.display='none'; return; }
  // cumulative net: in adds, out subtracts (minor units)
  let cum=0; const pts=[];
  for(const e of rows){ cum += (e.direction==='in' ? e.amount_minor : -e.amount_minor); pts.push(cum); }
  box.style.display='';
  const ph=el('div','ph');
  const t=el('div','t','Net position over rounds'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','cumulative · from ledger'));
  box.append(ph);

  const W=560, H=180, padL=8, padR=8, padT=18, padB=22;
  const minV=Math.min(0, ...pts), maxV=Math.max(0, ...pts);
  const span=(maxV-minV)||1;
  const x=(i)=> padL + (pts.length>1 ? i*(W-padL-padR)/(pts.length-1) : 0);
  const y=(v)=> padT + (maxV - v)*(H-padT-padB)/span;
  const zeroY=y(0);

  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('class','chart');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('role','img');
  svg.setAttribute('aria-label','Cumulative net position across recorded chit ledger entries');
  // defs gradient
  const defs=document.createElementNS(svgNS,'defs');
  const grad=document.createElementNS(svgNS,'linearGradient');
  grad.setAttribute('id','netfill'); grad.setAttribute('x1','0'); grad.setAttribute('y1','0'); grad.setAttribute('x2','0'); grad.setAttribute('y2','1');
  const s1=document.createElementNS(svgNS,'stop'); s1.setAttribute('offset','0'); s1.setAttribute('stop-color','var(--primary)'); s1.setAttribute('stop-opacity','0.20');
  const s2=document.createElementNS(svgNS,'stop'); s2.setAttribute('offset','1'); s2.setAttribute('stop-color','var(--primary)'); s2.setAttribute('stop-opacity','0');
  grad.append(s1,s2); defs.append(grad); svg.append(defs);
  // zero baseline
  const zl=document.createElementNS(svgNS,'line'); zl.setAttribute('class','zero');
  zl.setAttribute('x1',padL); zl.setAttribute('y1',zeroY); zl.setAttribute('x2',W-padR); zl.setAttribute('y2',zeroY); svg.append(zl);
  // area + line
  let lpts=pts.map((v,i)=>x(i)+','+y(v)).join(' ');
  const area=document.createElementNS(svgNS,'path');
  area.setAttribute('class','area');
  area.setAttribute('d','M'+x(0)+','+zeroY+' L'+pts.map((v,i)=>x(i)+','+y(v)).join(' L')+' L'+x(pts.length-1)+','+zeroY+' Z');
  svg.append(area);
  const ln=document.createElementNS(svgNS,'polyline'); ln.setAttribute('class','ln'); ln.setAttribute('points',lpts); svg.append(ln);
  const wrap=el('div','chartwrap'); wrap.append(svg); box.append(wrap);
  const cap=el('div','chartcap');
  const c1=el('span'); const sw=el('i','swatch'); sw.style.background='var(--primary)'; c1.append(sw, document.createTextNode('cumulative net (received − contributed)')); cap.append(c1);
  box.append(cap);
}

// ── chit terms ──
function renderTerms(box, st){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Chit terms'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','contract'));
  box.append(ph);
  const body=el('div','terms');
  function trowText(k,v){
    const r=el('div','trow');
    r.append(el('span','tk',k));
    const tv=el('span','tv'); tv.textContent=v; r.append(tv);
    body.append(r);
  }
  function trowAmt(k,minor){
    const r=el('div','trow');
    r.append(el('span','tk',k));
    const tv=el('span','tv'); tv.append(amtSpan(minor)); r.append(tv);
    body.append(r);
  }
  trowAmt('Chit value', st.chit_value_minor);
  trowText('Members', String(st.n_members));
  trowText('Commission', (st.commission_bps/100)+'%');
  trowAmt('Subscription / mo', st.subscription_minor);
  trowText('Rounds recorded', st.months_recorded+' of '+st.n_members);
  box.append(body);
}

// ── members (sharing) ──
function renderMembers(box){
  box.textContent='';
  const ph=el('div','ph');
  const t=el('div','t','Member roster'); t.style.fontSize='16px';
  ph.append(t, el('div','meta','joint ownership'));
  box.append(ph);
  const body=el('div'); body.style.padding='18px 22px';
  box.append(body);
  mountSharing(pid, body);
}

// ── add-entry slide-over open/close ──
function openOver(){ $('err').textContent=''; $('scrim').classList.add('on'); $('over').classList.add('on'); $('over').setAttribute('aria-hidden','false'); $('amount').focus(); }
function closeOver(){ $('scrim').classList.remove('on'); $('over').classList.remove('on'); $('over').setAttribute('aria-hidden','true'); }

// ── boot ──
async function boot(){
  const me = await fetch('/api/auth/me');
  if(me.status===401){ window.location.href='/'; return; }
  const user=(await me.json()).user;
  $('ava-init').textContent=((user.display_name||'?')[0]||'?').toUpperCase();

  const r = await fetch('/api/plans/'+pid);
  if(r.status===401){ window.location.href='/'; return; }
  if(!r.ok){ window.location.href='/app'; return; }
  const d = await r.json();
  if(d.plan.type!=='chit'){ window.location.href='/app'; return; }

  const plan=d.plan, st=d.state;
  BASE = plan.currency || 'INR';
  document.documentElement.dataset.cur = BASE.toLowerCase();
  document.title = 'Khata — '+plan.name;
  document.querySelectorAll('#curtog button').forEach(b=>b.classList.toggle('on', b.dataset.set===BASE));

  $('name').textContent = plan.name;
  $('sub').textContent = 'Chit funds · '+st.n_members+' members · '+plan.status+' · '+BASE;
  $('osub').textContent = 'to '+plan.name;

  renderHeader($('header-panel'), plan, st);
  renderRounds($('rounds-panel'), st);
  renderLedger($('ledger-panel'), st);
  renderPosition($('position-panel'), st);
  renderChart($('chart-panel'), st);
  renderTerms($('terms-panel'), st);
  renderMembers($('members-panel'));

  // sidebar counts from /api/plans
  try{
    const plansResp = await fetch('/api/plans').then(x=>x.json());
    const plans = plansResp.plans || [];
    const by=(t)=>plans.filter(p=>p.type===t).length||'';
    $('ct-asset').textContent=by('asset');
    $('ct-chit').textContent=by('chit');
    $('ct-loan').textContent=by('loan');
    $('ct-retirement').textContent=by('retirement');
  }catch(e){}

  setTimeout(()=>document.querySelectorAll('[data-w]').forEach(b=>b.style.width=b.dataset.w+'%'),350);
}

// ── currency toggle: real base-currency switch ──
$('curtog').addEventListener('click', async (e)=>{
  const b=e.target.closest('button'); if(!b) return;
  const target=b.dataset.set;
  if(target===BASE) return;
  await fetch('/api/base-currency',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currency:target})});
  location.reload();
});

// ── add-entry wiring ──
$('addbtn').addEventListener('click', openOver);
$('cancel').addEventListener('click', closeOver);
$('scrim').addEventListener('click', closeOver);
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ closeOver(); } });
$('save').addEventListener('click', async ()=>{
  $('err').textContent='';
  const body={ kind:$('kind').value, amount:$('amount').value, occurred_at:($('occurred').value || null), note:($('note').value || null) };
  const r=await fetch('/api/plans/'+pid+'/chit/entries', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if(r.ok){ closeOver(); $('amount').value=''; $('note').value=''; $('occurred').value=''; boot(); return; }
  const e=await r.json().catch(()=>({}));
  $('err').textContent = e.detail || e.error || 'Could not save the entry.';
});

// ── profile photo upload (localStorage, display-only) ──
(function(){var av=document.getElementById("avatar");if(!av)return;var inp=av.querySelector("input"),KEY="khata_avatar";function apply(u){av.style.backgroundImage="url("+u+")";av.classList.add("has-img");}try{var s=localStorage.getItem(KEY);if(s)apply(s);}catch(e){}inp.addEventListener("change",function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){apply(r.result);try{localStorage.setItem(KEY,r.result);}catch(e){}};r.readAsDataURL(f);});})();

boot();
</script>
